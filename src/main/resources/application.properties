spring.application.name=fikambananay2
# Connexion Á MySQL via Docker
spring.datasource.url=jdbc:mysql://db:3306/fikambananay_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=fikambananay_user
spring.datasource.password=fikambananay_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Port de l'application
server.port=8082